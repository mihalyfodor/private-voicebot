<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voicebot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    #shutdown {
      position: fixed;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #444;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #shutdown:hover { color: #cc2222; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    #btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #444;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s ease;
      outline: none;
      text-transform: uppercase;
    }

    #btn:hover { border-color: #888; }

    #btn.recording {
      background: #3a0000;
      border-color: #cc2222;
      color: #ff6666;
      box-shadow: 0 0 24px rgba(200, 0, 0, 0.4);
    }

    #btn.thinking, #btn.processing, #btn.speaking {
      border-color: #555;
      color: #888;
      cursor: default;
    }

    #status {
      font-size: 13px;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      height: 18px;
    }

    #transcript {
      width: 480px;
      max-width: 90vw;
      max-height: 40vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .msg .role {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
    }

    .msg.user .role { color: #4a90d9; }
    .msg.assistant .role { color: #7a7a7a; }

    .msg .text {
      font-size: 15px;
      line-height: 1.5;
      color: #e0e0e0;
    }

    #transcript::-webkit-scrollbar { width: 4px; }
    #transcript::-webkit-scrollbar-track { background: transparent; }
    #transcript::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>

  <button id="shutdown" onclick="ws.send(JSON.stringify({action:'shutdown'}));window.close()">shut down</button>

  <div id="transcript"></div>

  <button id="btn">Speak</button>

  <div id="status">connecting...</div>

  <script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const transcript = document.getElementById('transcript');

    let ws;
    let state = 'idle';

    const statusText = {
      idle: 'press space or click to speak',
      recording: 'recording — press space or click to stop',
      processing: 'processing...',
      thinking: 'thinking...',
      speaking: 'speaking...'
    };

    const btnText = {
      idle: 'Speak',
      recording: 'Stop',
      processing: '...',
      thinking: '...',
      speaking: '...'
    };

    function connect() {
      ws = new WebSocket('ws://localhost:8000/ws');

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'state') {
          state = msg.value;
          btn.className = state === 'idle' ? '' : state;
          btn.textContent = btnText[state] || '...';
          status.textContent = statusText[state] || '';
          btn.disabled = !(state === 'idle' || state === 'recording');
        } else if (msg.type === 'transcript') {
          addMessage(msg.role, msg.text);
        }
      };

      ws.onopen = () => status.textContent = statusText['idle'];
      ws.onclose = () => {
        status.textContent = 'disconnected — retrying...';
        setTimeout(connect, 2000);
      };
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `
        <span class="role">${role === 'user' ? 'You' : 'Bot'}</span>
        <span class="text">${text}</span>
      `;
      transcript.appendChild(div);
      transcript.scrollTop = transcript.scrollHeight;
    }

    function toggle() {
      if (state === 'idle' || state === 'recording') {
        ws.send(JSON.stringify({ action: 'toggle' }));
      }
    }

    btn.addEventListener('click', toggle);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target === document.body) {
        e.preventDefault();
        toggle();
      }
    });

    connect();
  </script>
</body>
</html>
